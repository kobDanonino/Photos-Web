        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500&display=swap');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #050505; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            font-family: 'Rajdhani', sans-serif;
        }

        /* Capa de escaneo sutil sobre el contenido */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,242,255,0.03) 0px, rgba(0,242,255,0.03) 1px, transparent 2px, transparent 4px);
            pointer-events: none;
            z-index: 5;
        }

        #content {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 1;
        }

        img, video { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .back { 
            position: absolute; top: 20px; right: 20px; 
            color: #00f2ff; text-decoration: none; 
            background: rgba(0,0,0,0.8); 
            padding: 10px 20px; 
            border: 1px solid #00f2ff;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
            transition: 0.3s;
        }

        .back:hover {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0,242,255,0.6);
        }

        .loading-text {
            color: #00f2ff;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8em;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
