<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight Collective</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Encabezado sofisticado */
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            letter-spacing: -1px;
            font-weight: 700;
        }

        .owner-pill {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: rgba(255,255,255,0.6);
        }

        /* Grid de Navegación Cinematográfico */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            height: 60vh;
            gap: 1px; /* Línea divisoria elegante */
            background-color: rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .category {
            position: relative;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .category:hover {
            background-color: #111;
        }

        /* Imagen de fondo sutil en hover */
        .category-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1.1);
            transition: all 0.8s ease;
            filter: grayscale(100%) brightness(30%);
            z-index: 0;
        }

        .category:hover .category-bg {
            opacity: 0.4;
            transform: scale(1);
        }

        .category span {
            position: relative;
            z-index: 1;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-style: italic;
            transition: transform 0.4s ease;
        }

        .category:hover span {
            transform: translateY(-10px);
        }

        .category small {
            position: relative;
            z-index: 1;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.4);
            margin-top: 10px;
        }

        /* Footer con estadísticas limpias */
        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-grow: 1;
        }

        .stats-group {
            display: flex;
            gap: 40px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
        }

        /* Ajuste para móviles */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .category {
                padding: 60px 0;
                border-bottom: 1px solid rgba(255,255,255,0.1);
            }
            footer {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">Moonlight</div>
        <div class="owner-pill">By 𝓢𝓽𝓪𝓻𝓛𝔂𝓷</div>
    </header>

    <div class="container">
        <a href="tetas.html" class="category">
            <div class="category-bg" style="background-image: url('https://files.catbox.moe/jl76up.jpg');"></div>
            <span>Tetas</span>
            <small>Collection 01</small>
        </a>
        <a href="gay.html" class="category">
            <div class="category-bg" style="background-image: url('https://files.catbox.moe/8rzptn.mp4');"></div>
            <span>Gay</span>
            <small>Collection 02</small>
        </a>
        <a href="pene.html" class="category">
            <div class="category-bg" style="background-image: url('https://files.catbox.moe/83q63y.jpg');"></div>
            <span>Pene</span>
            <small>Collection 03</small>
        </a>
    </div>

    <footer>
        <div class="stats-group">
            <div class="stat-item">
                <span class="stat-value" id="total-img">0</span>
                <span class="stat-label">Imágenes</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="total-vid">0</span>
                <span class="stat-label">Videos</span>
            </div>
        </div>
        <div class="stat-item" style="text-align: right;">
            <span class="stat-value" style="color: #666;">NSFW</span>
            <span class="stat-label">Database Status: Active</span>
        </div>
    </footer>

    <script>
        function loadStats() {
            let img = 0;
            let vid = 0;
            ['tetas', 'gay', 'pene'].forEach(cat => {
                const d = JSON.parse(localStorage.getItem('stats_' + cat));
                if(d) {
                    img += d.f || 0;
                    vid += d.v || 0;
                }
            });
            document.getElementById('total-img').textContent = img;
            document.getElementById('total-vid').textContent = vid;
        }
        window.onload = loadStats;
        window.onfocus = loadStats;
    </script>
</body>
</html>
