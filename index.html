<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight - Premium Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(0,0,0,0.9), rgba(0,0,0,0.5)), url('https://files.catbox.moe/tut48g.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.3) contrast(1.3);
        }

        .bg-overlay::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,242,255,0.03) 0px, rgba(0,242,255,0.03) 1px, transparent 2px, transparent 4px);
            pointer-events: none;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 40px;
            border-radius: 5px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 85%;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .corner-banner {
            position: absolute; top: 20px; left: 20px;
            display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 2px;
            border-left: 4px solid var(--cyan);
            z-index: 100;
        }
        .corner-banner span { font-family: 'Syncopate', sans-serif; font-size: 0.65em; letter-spacing: 2px; }

        .bubble-container { display: flex; flex-direction: column; gap: 15px; margin: 30px 0; }

        .bubble {
            position: relative;
            padding: 12px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.3em;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(0, 242, 255, 0.15);
            transition: 0.3s;
            overflow: hidden;
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.2), transparent);
            transition: 0.4s;
        }

        .bubble:hover::before { left: 100%; }

        .bubble:hover {
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.5);
            transform: translateX(5px);
            text-shadow: 0 0 8px var(--cyan);
        }

        .dev-section { margin-top: 30px; opacity: 0.8; }
        .dev-banner {
            width: 70px; height: 70px; border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
        }
        .dev-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.7em;
            margin-top: 10px;
            letter-spacing: 1px;
            color: var(--cyan);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .decoration {
            position: absolute;
            width: 15px; height: 15px;
            border: 2px solid var(--cyan);
        }
        .top-l { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .bottom-r { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="corner-banner">
        <img src="https://files.catbox.moe/da8obc.jpeg" width="20" style="border-radius:50%; margin-right:10px;">
        <span>MOONLIGHT ACCESS</span>
    </div>

    <div class="container">
        <div style="position:relative">
            <div class="decoration top-l"></div>
            <div class="decoration bottom-r"></div>
            
            <h2 style="font-family:'Syncopate'; font-size: 0.8em; color: var(--cyan); margin-bottom: 25px; letter-spacing: 4px; opacity: 0.8;">MAIN TERMINAL</h2>

            <div class="bubble-container">
                <a href="tetas.html" class="bubble">Tetas</a>
                <a href="gay.html" class="bubble">Gay</a>
                <a href="pene.html" class="bubble">Pene</a>
            </div>
        </div>

        <div class="dev-section">
            <img src="https://files.catbox.moe/mqcxut.jpeg" class="dev-banner">
            <div class="dev-name">𝓢𝓽𝓪𝓻𝓛𝔂𝓷 // OWNER</div>
        </div>
    </div>

</body>
</html>
