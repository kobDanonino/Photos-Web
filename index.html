<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>MOONLIGHT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Ruido de fondo sutil */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://grainy-gradients.vercel.app/noise.svg);
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        /* Header */
        header {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
        }

        .status {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #444;
            letter-spacing: 2px;
        }

        /* Contenido Central */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5vw;
        }

        .menu-item {
            text-decoration: none;
            color: #1a1a1a; /* Color apagado por defecto */
            font-size: clamp(3rem, 10vw, 8rem); /* Texto gigante */
            line-height: 0.9;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            width: fit-content;
        }

        .menu-item:hover {
            color: #fff;
            transform: skewX(-10deg);
        }

        /* El contador pequeño al lado del texto */
        .menu-item::after {
            content: attr(data-count);
            position: absolute;
            top: 0;
            right: -30px;
            font-size: 1rem;
            font-family: 'Space Mono', monospace;
            color: #ff0055; /* Color de acento */
            font-weight: 400;
        }

        /* Footer */
        footer {
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 20;
        }

        .owner-info {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        .owner-info span {
            color: #ff0055;
        }

        .stats-display {
            text-align: right;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            line-height: 1.5;
            color: #666;
        }

        /* Animación de entrada */
        .reveal {
            animation: revealText 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        @keyframes revealText {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .menu-item { font-size: 4rem; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="status">SYSTEM: ACTIVE // STABLE</div>
        <div class="status" id="clock">00:00:00</div>
    </header>

    <main>
        <a href="tetas.html" class="menu-item reveal" style="animation-delay: 0.1s;">Tetas</a>
        <a href="gay.html" class="menu-item reveal" style="animation-delay: 0.2s;">Gay</a>
        <a href="pene.html" class="menu-item reveal" style="animation-delay: 0.3s;">Pene</a>
    </main>

    <footer>
        <div class="owner-info">
            BY <span>𝓢𝓽𝓪𝓻𝓛𝔂𝓷</span>
        </div>
        <div class="stats-display" id="global-stats">
            LOADING DATA...<br>
            0 IMG / 0 VID
        </div>
    </footer>

    <script>
        function updateStats() {
            let img = 0, vid = 0;
            ['tetas', 'gay', 'pene'].forEach(cat => {
                const d = JSON.parse(localStorage.getItem('stats_' + cat));
                if(d) { img += d.f || 0; vid += d.v || 0; }
            });
            document.getElementById('global-stats').innerHTML = `DATABASE ACCESS<br>${img} IMG / ${vid} VID`;
        }

        function startTime() {
            const now = new Date();
            document.getElementById('clock').innerHTML = now.toLocaleTimeString();
            setTimeout(startTime, 1000);
        }

        window.onload = () => {
            updateStats();
            startTime();
        }
    </script>
</body>
</html>
