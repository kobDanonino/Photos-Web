<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* FONDO: Imagen fija de alta calidad que ya tienes */
        .background-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 20%, transparent 100%), 
                        url('https://files.catbox.moe/tut48g.jpeg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* CONTENIDO */
        .wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 8%;
        }

        .title {
            font-size: 12px;
            letter-spacing: 10px;
            text-transform: uppercase;
            font-weight: 200;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-link {
            text-decoration: none;
            color: white;
            font-size: 70px;
            font-weight: 900;
            line-height: 1;
            transition: all 0.4s ease;
            width: fit-content;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
            color: transparent;
        }

        .nav-link:hover {
            -webkit-text-stroke: 1px rgba(255,255,255,0);
            color: white;
            transform: translateX(20px);
        }

        /* INFO INFERIOR */
        .footer {
            position: absolute;
            bottom: 40px;
            left: 8%;
            display: flex;
            gap: 50px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .owner-tag {
            font-weight: 900;
            color: white;
            opacity: 1;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .nav-link { font-size: 50px; }
            .background-overlay { background-position: 70% center; }
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="wrapper">
        <div class="title">Moonlight Archive</div>
        
        <nav>
            <a href="tetas.html" class="nav-link">TETAS</a>
            <a href="gay.html" class="nav-item nav-link">GAY</a>
            <a href="pene.html" class="nav-link">PENE</a>
        </nav>

        <div class="footer">
            <div class="owner-tag">𝓢𝓽𝓪𝓻𝓛𝔂𝓷</div>
            <div id="stats-line">0 IMG / 0 VID</div>
        </div>
    </div>

    <script>
        function loadData() {
            let i = 0, v = 0;
            ['tetas', 'gay', 'pene'].forEach(c => {
                const d = JSON.parse(localStorage.getItem('stats_' + c));
                if(d) { i += d.f || 0; v += d.v || 0; }
            });
            document.getElementById('stats-line').innerHTML = `${i} IMÁGENES / ${v} VIDEOS`;
        }
        window.onload = loadData;
    </script>
</body>
</html>
