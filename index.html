<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight - Tactical Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f2ff;
            --dark-cyan: #00666b;
            --dark-bg: #030303;
            --panel-bg: rgba(5, 10, 15, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--dark-bg); color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.5)), url('https://files.catbox.moe/tut48g.jpeg');
            background-size: cover; background-position: center; z-index: -1;
            filter: brightness(0.4);
        }

        .terminal {
            position: relative; width: 90%; max-width: 420px;
            padding: 40px 30px; background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 92% 0, 100% 8%, 100% 100%, 8% 100%, 0 92%);
        }

        .header h1 {
            font-family: 'Syncopate', sans-serif; font-size: 1em;
            letter-spacing: 10px; color: var(--cyan); margin: 0;
        }

        .nav-links { display: flex; flex-direction: column; gap: 10px; margin: 30px 0; }

        .btn {
            padding: 15px; text-decoration: none; color: white;
            font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            background: rgba(255,255,255,0.03); border-left: 3px solid var(--dark-cyan);
            transition: 0.3s; text-align: center;
        }

        .btn:hover {
            background: rgba(0, 242, 255, 0.1); border-left: 3px solid var(--cyan);
            transform: translateX(5px); color: var(--cyan);
        }

        /* --- BARRA DE ESTADO TÁCTICA --- */
        .status-footer-bar {
            margin-top: 25px; padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .bar-labels {
            display: flex; justify-content: space-between;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px; color: var(--cyan); margin-bottom: 8px;
        }

        .progress-track {
            width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .progress-fill {
            height: 100%; width: 0%;
            background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
            transition: width 1s ease;
        }

        .owner-section {
            display: flex; align-items: center; gap: 10px; margin-top: 20px;
        }
        .owner-avatar { width: 40px; height: 40px; border: 1px solid var(--cyan); border-radius: 50%; }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="terminal">
        <div class="header">
            <h1>MOONLIGHT</h1>
            <p style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">ENCRYPTED DATABASE ACCESS</p>
        </div>

        <nav class="nav-links">
            <a href="tetas.html" class="btn">Tetas</a>
            <a href="gay.html" class="btn">Gay</a>
            <a href="pene.html" class="btn">Pene</a>
        </nav>

        <div class="owner-section">
            <img src="https://files.catbox.moe/mqcxut.jpeg" class="owner-avatar">
            <div style="font-size: 12px;">
                <div style="color: var(--cyan); font-family: 'Syncopate'; font-size: 8px;">ADMINISTRATOR</div>
                <div>𝓢𝓽𝓪𝓻𝓛𝔂𝓷 // OWNER</div>
            </div>
        </div>

        <div class="status-footer-bar">
            <div class="bar-labels">
                <span id="counter-text">DATA: 0 IMG | 0 VID</span>
                <span>BAT: <span id="bat-pct">--%</span></span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="bat-bar"></div>
            </div>
        </div>
    </div>

    <script>
        function updateStats() {
            let totalFotos = 0;
            let totalVideos = 0;

            // Buscamos los datos guardados de cada archivo
            ['tetas', 'gay', 'pene'].forEach(cat => {
                const data = JSON.parse(localStorage.getItem('stats_' + cat));
                if(data) {
                    totalFotos += data.f;
                    totalVideos += data.v;
                }
            });

            document.getElementById('counter-text').textContent = `TOTAL: ${totalFotos} IMG | ${totalVideos} VID`;
        }

        function initBattery() {
            if (navigator.getBattery) {
                navigator.getBattery().then(bat => {
                    const refresh = () => {
                        document.getElementById('bat-pct').textContent = Math.floor(bat.level * 100) + "%";
                        document.getElementById('bat-bar').style.width = (bat.level * 100) + "%";
                    };
                    refresh();
                    bat.onlevelchange = refresh;
                });
            }
        }

        updateStats();
        initBattery();
    </script>
</body>
</html>
