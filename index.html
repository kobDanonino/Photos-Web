<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Michroma&family=Montserrat:wght@100;400;900&display=swap');

        :root {
            --neon: #00f2ff;
            --bg: #030303;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; 
            font-family: 'Montserrat', sans-serif; overflow: hidden;
        }

        /* Fondo dinámico con partículas de luz */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #00151a 0%, #000 80%);
            z-index: -1;
        }

        .glow-sphere {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            top: -200px; right: -200px; animation: float 10s infinite alternate;
        }

        /* Contenedor Principal */
        .ui-wrapper {
            height: 100vh; display: flex; flex-direction: column;
            padding: 40px; justify-content: space-between;
        }

        /* Header Minimalista */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px;
        }

        .logo {
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            letter-spacing: 12px; font-size: 1.2rem; color: var(--neon);
            text-shadow: 0 0 15px rgba(0,242,255,0.5);
        }

        /* Menú Centralizado */
        .menu-container {
            display: flex; gap: 30px; align-items: center; justify-content: center;
        }

        .card {
            position: relative; width: 280px; height: 400px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding: 40px 20px; text-decoration: none;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .card::before {
            content: ''; position: absolute; top: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, var(--neon) 0%, transparent 50%);
            opacity: 0; transition: 0.5s;
        }

        .card:hover {
            transform: translateY(-20px); border-color: var(--neon);
            box-shadow: 0 20px 40px rgba(0, 242, 255, 0.1);
        }

        .card:hover::before { opacity: 0.15; }

        .card-title {
            font-family: 'Michroma', sans-serif;
            font-size: 0.8rem; letter-spacing: 4px; color: #fff;
            text-transform: uppercase; z-index: 1;
        }

        .card-number {
            position: absolute; top: 20px; left: 20px;
            font-family: 'Syncopate', sans-serif; font-size: 3rem;
            opacity: 0.05; transition: 0.5s;
        }

        .card:hover .card-number { opacity: 0.2; color: var(--neon); }

        /* Barra de Datos Inferior */
        .footer-info {
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; font-size: 0.6rem; letter-spacing: 3px;
            color: rgba(255,255,255,0.4);
        }

        .stat-box { display: flex; flex-direction: column; gap: 5px; }
        .stat-box strong { color: var(--neon); font-size: 1.2rem; font-family: 'Syncopate'; }

        .owner-section {
            text-align: center; border: 1px solid var(--neon);
            padding: 10px 30px; border-radius: 50px; color: var(--neon);
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(-100px, 100px); }
        }

        /* Mobile Fix */
        @media (max-width: 900px) {
            .menu-container { flex-direction: column; overflow-y: auto; padding-top: 50px; }
            .card { width: 100%; height: 150px; }
            .ui-wrapper { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="glow-sphere"></div>
    </div>

    <div class="ui-wrapper">
        <header class="top-nav">
            <div class="logo">MOONLIGHT</div>
            <div style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5;">v3.0 SYSTEM // STABLE</div>
        </header>

        <main class="menu-container">
            <a href="tetas.html" class="card">
                <span class="card-number">01</span>
                <span class="card-title">Categoría: Tetas</span>
            </a>
            <a href="gay.html" class="card">
                <span class="card-number">02</span>
                <span class="card-title">Categoría: Gay</span>
            </a>
            <a href="pene.html" class="card">
                <span class="card-number">03</span>
                <span class="card-title">Categoría: Pene</span>
            </a>
        </main>

        <footer class="footer-info">
            <div class="stat-box">
                <span>ESTADÍSTICAS GLOBALES</span>
                <strong id="total-count">000</strong>
            </div>
            
            <div class="owner-section">
                OPERATOR: 𝓢𝓽𝓪𝓻𝓛𝔂𝓷
            </div>

            <div class="stat-box" style="text-align: right;">
                <span id="file-distribution">IMG: 0 | VID: 0</span>
                <span style="color: var(--neon); font-weight: bold;">ENCRIPTACIÓN ACTIVA</span>
            </div>
        </footer>
    </div>

    <script>
        function updateUI() {
            let totalF = 0;
            let totalV = 0;

            ['tetas', 'gay', 'pene'].forEach(cat => {
                const data = JSON.parse(localStorage.getItem('stats_' + cat));
                if (data) {
                    totalF += (data.f || 0);
                    totalV += (data.v || 0);
                }
            });

            document.getElementById('total-count').textContent = (totalF + totalV).toString().padStart(3, '0');
            document.getElementById('file-distribution').textContent = `IMG: ${totalF} | VID: ${totalV}`;
        }

        window.onload = updateUI;
        window.onfocus = updateUI;
    </script>
</body>
</html>
