<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight - Tactical Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap');

        :root {
            --cyan: #00f2ff;
            --dark-cyan: #00666b;
            --purple: #bc13fe;
            --dark-bg: #030303;
            --panel-bg: rgba(5, 10, 15, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BACKGROUND & OVERLAYS --- */
        .bg-video-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.4)), url('https://files.catbox.moe/tut48g.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            transform: scale(1.1);
            filter: grayscale(0.5) brightness(0.4);
            animation: bgBreath 20s ease-in-out infinite;
        }

        @keyframes bgBreath {
            0%, 100% { transform: scale(1.1); }
            50% { transform: scale(1.2); }
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 242, 255, 0.02) 50%);
            background-size: 100% 4px;
            z-index: 10; pointer-events: none;
        }

        /* --- TERMINAL CONTAINER --- */
        .terminal {
            position: relative;
            width: 90%;
            max-width: 400px;
            padding: 50px 30px 40px 30px;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(15px);
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 242, 255, 0.05);
            animation: glitchOpen 0.5s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        @keyframes glitchOpen {
            0% { transform: scaleY(0.005) scaleX(0); opacity: 0; }
            50% { transform: scaleY(0.005) scaleX(1); opacity: 1; }
            100% { transform: scaleY(1) scaleX(1); }
        }

        /* --- HEADER --- */
        .status-bar {
            position: absolute; top: 12px; left: 30px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: var(--cyan);
            letter-spacing: 2px;
            display: flex; gap: 20px;
        }

        .header h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.9em;
            letter-spacing: 8px;
            color: var(--cyan);
            margin: 0 0 5px 0;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .sub-header {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 35px;
        }

        /* --- BUTTONS --- */
        .nav-links { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            position: relative;
            padding: 14px;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.02);
            border-left: 3px solid var(--dark-cyan);
            transition: all 0.3s;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .btn:hover {
            background: rgba(0, 242, 255, 0.08);
            border-left: 3px solid var(--cyan);
            transform: translateX(8px);
            color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        /* --- FOOTER & BATTERY --- */
        .footer {
            margin-top: 40px;
            display: flex; align-items: center; gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }

        .owner-avatar {
            width: 45px; height: 45px;
            border: 2px solid var(--cyan);
            padding: 2px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .owner-name { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: #fff; }
        .owner-label { font-size: 9px; color: var(--cyan); font-family: 'Syncopate'; opacity: 0.6; }

        .status-footer-bar {
            margin-top: 20px;
            display: flex; flex-direction: column; gap: 6px;
        }

        .bar-labels {
            display: flex; justify-content: space-between;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px; color: var(--cyan);
            letter-spacing: 1px;
        }

        .progress-track {
            width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.15);
            position: relative;
        }

        .progress-fill {
            height: 100%; width: 0%;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            transition: width 1s ease-in-out;
        }

        .decor-line { position: absolute; background: var(--cyan); opacity: 0.3; }
        .h-line { height: 1px; width: 40px; bottom: 15px; left: 0; }
        .v-line { width: 1px; height: 40px; top: 0; right: 15px; }

    </style>
</head>
<body>

    <div class="bg-video-overlay"></div>
    <div class="scanlines"></div>

    <div class="terminal">
        <div class="status-bar">
            <span>SYS.LIVE</span>
            <span>SECURE_LINK</span>
            <span id="clock">00:00:00</span>
        </div>

        <div class="header">
            <h1>MOONLIGHT</h1>
            <div class="sub-header">Tactical Menu Interface</div>
        </div>

        <nav class="nav-links">
            <a href="tetas.html" class="btn"><span>Tetas</span></a>
            <a href="gay.html" class="btn"><span>Gay</span></a>
            <a href="pene.html" class="btn"><span>Pene</span></a>
        </nav>

        <div class="footer">
            <img src="https://files.catbox.moe/mqcxut.jpeg" class="owner-avatar">
            <div class="owner-info">
                <div class="owner-label">AUTHORIZED BY</div>
                <div class="owner-name">𝓢𝓽𝓪𝓻𝓛𝔂𝓷 // OWNER</div>
            </div>
        </div>

        <!-- BARRA NSFW 2 & BATERÍA -->
        <div class="status-footer-bar">
            <div class="bar-labels">
                <span>NSFW 2</span>
                <span>BATERÍA: <span id="bat-level">--%</span></span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="bat-bar"></div>
            </div>
        </div>

        <div class="decor-line h-line"></div>
        <div class="decor-line v-line"></div>
    </div>

    <script>
        // Reloj Real
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = 
                now.getHours().toString().padStart(2, '0') + ":" + 
                now.getMinutes().toString().padStart(2, '0') + ":" + 
                now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Lógica de Batería Real
        function initBattery() {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(function(battery) {
                    function updateAll() {
                        const level = Math.floor(battery.level * 100);
                        document.getElementById('bat-level').textContent = level + "%";
                        document.getElementById('bat-bar').style.width = level + "%";
                    }
                    updateAll();
                    battery.addEventListener('levelchange', updateAll);
                });
            } else {
                document.getElementById('bat-level').textContent = "N/A";
                document.getElementById('bat-bar').style.width = "100%";
            }
        }
        initBattery();
    </script>

</body>
</html>
