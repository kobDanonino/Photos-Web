<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight - Premium Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --dark-bg: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Capa de fondo animada */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(0,0,0,0.8), rgba(0,0,0,0.4)), url('https://files.catbox.moe/tut48g.jpeg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Animación de escaneo (Cyberpunk) */
        .bg-overlay::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,242,255,0.03) 0px, rgba(0,242,255,0.03) 1px, transparent 2px, transparent 4px);
            pointer-events: none;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 85%;
            animation: slideUp 1s ease-out;
        }

        .corner-banner {
            position: absolute; top: 20px; left: 20px;
            display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 10px;
            border-left: 4px solid var(--cyan);
        }
        .corner-banner span { font-family: 'Syncopate', sans-serif; font-size: 0.7em; letter-spacing: 2px; }

        .bubble-container { display: flex; flex-direction: column; gap: 20px; margin: 30px 0; }

        .bubble {
            position: relative;
            padding: 15px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.4em;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(0, 242, 255, 0.2);
            transition: 0.4s;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Efecto de brillo al pasar el mouse */
        .bubble::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .bubble:hover::before { left: 100%; }

        .bubble:hover {
            border-color: var(--cyan);
            background: rgba(0, 242, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transform: scale(1.02);
            text-shadow: 0 0 10px var(--cyan);
        }

        .dev-section { margin-top: 30px; }
        .dev-banner {
            width: 80px; height: 80px; border-radius: 50%;
            padding: 4px;
            background: linear-gradient(45deg, var(--cyan), var(--purple));
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.5);
        }
        .dev-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.8em;
            margin-top: 10px;
            background: linear-gradient(to right, #fff, var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decoración de esquinas */
        .decoration {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--cyan);
        }
        .top-l { top: -5px; left: -5px; border-right: 0; border-bottom: 0; }
        .bottom-r { bottom: -5px; right: -5px; border-left: 0; border-top: 0; }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="corner-banner">
        <img src="https://files.catbox.moe/da8obc.jpeg" width="25" style="border-radius:50%; margin-right:10px;">
        <span>MOONLIGHT STAFF</span>
    </div>

    <div class="container">
        <div style="position:relative">
            <div class="decoration top-l"></div>
            <div class="decoration bottom-r"></div>
            
            <h2 style="font-family:'Syncopate'; font-size: 0.9em; color: var(--cyan); margin-bottom: 30px; letter-spacing: 5px;">DATABASE ACCESS</h2>

            <div class="bubble-container">
                <a href="tetas.html" class="bubble">Tetas</a>
                <a href="penes.html" class="bubble">Penes</a>
            </div>
        </div>

        <div class="dev-section">
            <img src="https://files.catbox.moe/mqcxut.jpeg" class="dev-banner">
            <div class="dev-name">𝓢𝓽𝓪𝓻𝓛𝔂𝓷 // CORE DEV</div>
        </div>
    </div>

</body>
</html>
