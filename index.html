<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://files.catbox.moe/da8obc.jpeg" type="image/jpeg">
    <title>Moonlight Staff - Menu</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; 
            /* Fondo con overlay más oscuro para que resalte el neón */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://files.catbox.moe/tut48g.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Poppins', 'Segoe UI', sans-serif; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            overflow: hidden;
        }

        /* Efecto de partículas de luz sutiles */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(var(--neon-blue) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            z-index: 0;
        }

        .corner-banner {
            position: absolute; top: 20px; left: 20px; 
            display: flex; align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); /* Efecto cristal */
            padding: 8px 15px;
            border-radius: 50px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            z-index: 10;
        }

        .corner-banner img {
            width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon-blue);
        }

        .corner-banner span { 
            margin-left: 10px; 
            font-weight: 600; 
            font-size: 0.9em; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .bubble-container { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            z-index: 2; 
            width: 90%;
            max-width: 400px;
        }

        .bubble {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            padding: 15px 20px; 
            border-radius: 15px; 
            text-decoration: none;
            color: white;
            font-weight: 800; 
            font-size: 1.2em;
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 4px;
            overflow: hidden;
        }

        /* Borde animado cromático */
        .bubble::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            transition: transform 0.3s;
        }

        .bubble:hover {
            transform: translateY(-5px);
            background: rgba(112, 0, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .dev-section { 
            margin-top: 60px; 
            z-index: 2;
            animation: fadeIn 2s ease-in;
        }

        .dev-banner {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid var(--neon-purple); 
            object-fit: cover;
            padding: 3px;
            background: linear-gradient(var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 20px rgba(112, 0, 255, 0.5);
            transition: transform 0.5s ease;
        }

        .dev-banner:hover {
            transform: rotate(360deg);
        }

        .dev-name { 
            margin-top: 10px; 
            font-size: 1.1em; 
            color: #fff;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ajuste para móviles */
        @media (max-width: 480px) {
            .bubble { font-size: 1em; padding: 12px 10px; }
            .dev-banner { width: 80px; height: 80px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="corner-banner">
        <img src="https://files.catbox.moe/da8obc.jpeg" alt="Logo">
        <span>Moonlight Staff</span>
    </div>

    <div class="bubble-container">
        <a href="tetas.html" class="bubble">Tetas</a>
        <a href="penes.html" class="bubble">Penes</a>
    </div>

    <div class="dev-section">
        <img src="https://files.catbox.moe/mqcxut.jpeg" class="dev-banner" alt="Dev">
        <div class="dev-name">Developer: 𝓢𝓽𝓪𝓻𝓛𝔂𝓷</div>
    </div>

</body>
</html>
