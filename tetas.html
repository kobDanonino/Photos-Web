<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer - Tetas</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        img, video { max-width: 100%; max-height: 100%; object-fit: contain; }
        .back { position: absolute; top: 10px; right: 10px; color: white; text-decoration: none; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-size: 0.8em; }
    </style>
</head>
<body>
    <a href="index.html" class="back">Volver</a>
    <div id="content"></div>

    <script>
        const media = [
            "https://files.catbox.moe/jl76up.jpg",
            "https://files.catbox.moe/wlcdh0.mp4",
            "https://files.catbox.moe/96kome.jpg"
        ];

        const selected = media[Math.floor(Math.random() * media.length)];
        const container = document.getElementById('content');

        if (selected.endsWith('.mp4')) {
            container.innerHTML = `<video src="${selected}" autoplay loop controls></video>`;
        } else {
            container.innerHTML = `<img src="${selected}">`;
        }
    </script>
</body>
</html>
